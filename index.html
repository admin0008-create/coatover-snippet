<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Snippet Manager - ตัวจัดการข้อความที่ใช้บ่อย</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; min-height: 100vh; }

/* ===== LOGIN PAGE ===== */
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.login-box { background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-box h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
.login-box p { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
.login-box .form-group { margin-bottom: 20px; }
.login-box label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 600; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.2s; }
.login-box input:focus { outline: none; border-color: #764ba2; }
.login-box .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
.login-box .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(118,75,162,0.4); }
.login-box .login-btn:active { transform: translateY(0); }
.login-error { color: #e74c3c; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
.login-logo { text-align: center; margin-bottom: 20px; font-size: 48px; }

/* ===== APP LAYOUT ===== */
.app { display: none; height: 100vh; }
.app.active { display: flex; }
.login-page.hidden { display: none; }

/* Sidebar */
.sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px 16px; font-weight: 700; font-size: 15px; color: #333; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }
.sidebar-header svg { width: 20px; height: 20px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: #555; font-size: 14px; transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { background: #f8f6ff; color: #764ba2; }
.nav-item.active { background: #f3eeff; color: #764ba2; border-left-color: #764ba2; font-weight: 600; }
.nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
.sidebar-footer { padding: 16px; border-top: 1px solid #eee; }
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #764ba2; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.user-details { min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; color: #333; }
.user-email { font-size: 11px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { margin-top: 10px; width: 100%; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; color: #888; transition: all 0.15s; }
.logout-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }

/* Main Content */
.main { flex: 1; overflow-y: auto; padding: 0; background: #fafafa; }
.content-area { max-width: 1100px; margin: 0 auto; padding: 28px 32px; }

/* Page Header */
.page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.back-btn { width: 36px; height: 36px; border: none; background: none; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #555; transition: background 0.15s; }
.back-btn:hover { background: #eee; }
.page-title { font-size: 26px; font-weight: 700; color: #333; }

/* Categories Grid */
.section-title { font-size: 20px; font-weight: 700; color: #333; margin-bottom: 8px; }
.section-desc { color: #999; font-size: 14px; margin-bottom: 20px; }
.categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.category-card { background: #fff; border: 1px dashed #ddd; border-radius: 12px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; }
.category-card:hover { border-color: #764ba2; box-shadow: 0 4px 12px rgba(118,75,162,0.1); transform: translateY(-2px); }
.category-card h3 { font-size: 16px; color: #333; margin-bottom: 4px; }
.category-card .count { font-size: 12px; color: #999; }
.category-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.category-card:hover .category-actions { opacity: 1; }

/* Subcategories */
.subcategories-area { background: #fff; border: 1px dashed #ddd; border-radius: 12px; padding: 24px; margin-bottom: 24px; min-height: 100px; }
.subcategories-area h4 { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 16px; }
.subcategory-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0; }
.subcategory-tab { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; color: #555; transition: all 0.15s; white-space: nowrap; }
.subcategory-tab:hover { border-color: #764ba2; color: #764ba2; }
.subcategory-tab.active { background: #764ba2; color: #fff; border-color: #764ba2; }
.empty-state { text-align: center; padding: 40px; color: #bbb; }
.empty-state svg { width: 64px; height: 64px; margin-bottom: 12px; color: #ddd; }
.empty-state p { font-size: 14px; margin-bottom: 4px; }

/* Add Buttons */
.add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: #764ba2; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.add-btn:hover { background: #5a3580; box-shadow: 0 4px 12px rgba(118,75,162,0.3); }
.add-btn.outline { background: #fff; color: #764ba2; border: 1px dashed #764ba2; }
.add-btn.outline:hover { background: #f8f6ff; box-shadow: none; }

/* Search & Toolbar */
.toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
.search-box { flex: 1; position: relative; }
.search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }
.search-box input:focus { outline: none; border-color: #764ba2; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #aaa; }

/* Snippet Cards */
.snippet-list { display: flex; flex-direction: column; gap: 12px; }
.snippet-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px 24px; transition: all 0.15s; position: relative; }
.snippet-card:hover { border-color: #d0c4e8; box-shadow: 0 2px 8px rgba(118,75,162,0.08); }
.snippet-card.starred { border-left: 3px solid #f5a623; }
.snippet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.snippet-code { display: inline-flex; align-items: center; gap: 8px; }
.snippet-code .code-badge { background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: #888; font-weight: 600; }
.snippet-code .move-btns { display: flex; gap: 2px; }
.snippet-code .move-btn { width: 24px; height: 24px; border: none; background: none; cursor: pointer; color: #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.snippet-code .move-btn:hover { background: #f0f0f0; color: #764ba2; }
.snippet-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.snippet-card:hover .snippet-actions { opacity: 1; }
.action-btn { width: 32px; height: 32px; border: none; background: none; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #999; transition: all 0.15s; font-size: 16px; }
.action-btn:hover { background: #f0f0f0; color: #764ba2; }
.action-btn.star { color: #ddd; }
.action-btn.star.active { color: #f5a623; }
.action-btn.delete:hover { color: #e74c3c; background: #fff5f5; }
.snippet-text { font-size: 14px; color: #555; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 32px; width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h2 { font-size: 20px; color: #333; margin-bottom: 24px; }
.modal .form-group { margin-bottom: 20px; }
.modal label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #555; }
.modal input, .modal textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
.modal input:focus, .modal textarea:focus { outline: none; border-color: #764ba2; }
.modal textarea { min-height: 120px; resize: vertical; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
.modal-actions .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.modal-actions .btn-cancel { background: #f0f0f0; color: #666; }
.modal-actions .btn-cancel:hover { background: #e0e0e0; }
.modal-actions .btn-primary { background: #764ba2; color: #fff; }
.modal-actions .btn-primary:hover { background: #5a3580; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; opacity: 0; transform: translateY(20px); transition: all 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }

/* Header bar for top of content */
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar .nav-item span, .sidebar-header span, .sidebar-footer .user-details, .sidebar-footer .logout-btn { display: none; }
  .content-area { padding: 16px; }
  .categories-grid { grid-template-columns: 1fr; }
}
</style>

// Compact SHA-256 (works on https, http, and file:// — no secure-context needed)
function sha256(ascii) {
  function rightRotate(value, amount) { return (value>>>amount) | (value<<(32-amount)); }
  var mathPow = Math.pow, maxWord = mathPow(2, 32), i, j, result = '';
  var words = [], asciiBitLength = ascii.length*8;
  var hash = sha256.h = sha256.h || [];
  var k = sha256.k = sha256.k || [];
  var primeCounter = k.length, isComposite = {};
  for (var candidate = 2; primeCounter < 64; candidate++) {

      k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;

  ascii += '\x80';
  while (ascii.length%64 - 56) ascii += '\x00';
  for (i = 0; i < ascii.length; i++) {
    j = ascii.charCodeAt(i);
    if (j>>8) return;
    words[i>>2] |= j << ((3 - i)%4)*8;
  }
  words[words.length] = ((asciiBitLength/maxWord)|0);
  words[words.length] = (asciiBitLength);

    var w = words.slice(j, j += 16), oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      var w15 = w[i - 15], w2 = w[i - 2];
      var a = hash[0], e = hash[4];
      var temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e&hash[5])^((~e)&hash[6])) + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3))
            + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10)))|0);
      var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
        + ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash = [(temp1 + temp2)|0].concat(hash);
      hash[4] = (hash[4] + temp1)|0;
    }
    for (i = 0; i < 8; i++) { hash[i] = (hash[i] + oldHash[i])|0; }
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      var b = (hash[i]>>(j*8))&255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;

// ============================================================
// STATE
// ============================================================
let data = null;
let currentUser = null;
let currentView = { type: 'page', pageId: 'page1' }; // page | category | subcategory
let searchQuery = '';
let activeSubcategory = null; // null = all

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.pages && parsed.categories && parsed.snippets) {
        data = parsed;
        if (!data.nextId) data.nextId = 1000;
        if (!data.subcategories) data.subcategories = [];
        return;
      }
    }
  } catch (e) { console.warn('Load failed', e); }
  data = getDefaultData();
  saveData();
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('Save failed', e);
    showToast('บันทึกข้อมูลไม่สำเร็จ (พื้นที่เต็ม)', 'error');
  }
}

function genId() {
  return 'id_' + (data.nextId++);
}

// ============================================================
// AUTH
// ============================================================
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const hash = sha256(LOGIN_SALT + password);
  const account = ADMIN_ACCOUNTS.find(a => a.email.toLowerCase() === email && a.passwordHash === hash);
  if (account) {
    currentUser = account;
    try { localStorage.setItem(AUTH_KEY, account.email); } catch (e) {}
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    initApp();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

function handleLogout() {
  currentUser = null;
  try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

// Auto-login if session exists
function tryAutoLogin() {
  try {
    const savedEmail = localStorage.getItem(AUTH_KEY);
    if (savedEmail) {
      const account = ADMIN_ACCOUNTS.find(a => a.email === savedEmail);
      if (account) {
        currentUser = account;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.add('active');
        initApp();
      }
    }
  } catch (e) {}
}

// ===== Backup / Restore =====
function exportData() {
  try {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const stamp = d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
    a.href = url;
    a.download = 'snippet-backup-' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('ดาวน์โหลดไฟล์สำรองข้อมูลแล้ว', 'success');
  } catch (e) {
    showToast('สำรองข้อมูลไม่สำเร็จ', 'error');
  }
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed && parsed.pages && parsed.categories && parsed.snippets) {
          if (confirm('การนำเข้าจะแทนที่ข้อมูลปัจจุบันทั้งหมด ต้องการดำเนินการต่อหรือไม่?')) {
            data = parsed;
            if (!data.nextId) data.nextId = 1000;
            if (!data.subcategories) data.subcategories = [];
            saveData();
            currentView = { type: 'page', pageId: data.pages[0].id };
            renderSidebar();
            renderContent();
            showToast('นำเข้าข้อมูลสำเร็จ', 'success');
          }
        } else {
          showToast('ไฟล์ไม่ถูกต้อง', 'error');
        }
      } catch (err) {
        showToast('อ่านไฟล์ไม่สำเร็จ', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Allow Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('loginPage').classList.contains('hidden')) {
    handleLogin();
  }
});

// ============================================================
// NAVIGATION
// ============================================================
function navigateTo(type, id) {
  searchQuery = '';
  activeSubcategory = null;
  if (type === 'page') {
    currentView = { type: 'page', pageId: id };
  } else if (type === 'category') {
    currentView = { type: 'category', categoryId: id };
  }
  renderSidebar();
  renderContent();
}

// ============================================================
function renderContent() {
  if (data) saveData();

    renderPageView(area);
  } else if (currentView.type === 'category') {
    renderCategoryView(area);
  }
}

function getVisibleSnippets(cat) {
  let snippets = data.snippets.filter(s => s.categoryId === cat.id);
  if (activeSubcategory) {
    snippets = snippets.filter(s => s.subcategoryId === activeSubcategory);
  }
  if (searchQuery) {
    const q = searchQuery.trim().toLowerCase();
    snippets = snippets.filter(s =>
      (s.code && s.code.toLowerCase().includes(q)) ||
      s.text.toLowerCase().includes(q)
    );
  }
  return snippets;
}

function renderSnippetListHTML(cat) {
  const snippets = getVisibleSnippets(cat);
  if (snippets.length === 0) return '<div class="empty-state"><p>ไม่พบข้อความ</p></div>';
  return snippets.map((snippet, idx) => renderSnippetCard(snippet, idx, snippets.length)).join('');
}

function renderSnippetCard(snippet, idx, total) {
  return `
    <div class="snippet-card ${snippet.starred ? 'starred' : ''}">
      <div class="snippet-header">
        <div class="snippet-code">
          <div class="move-btns">
            <button class="move-btn" onclick="moveSnippet('${snippet.id}','up')" title="เลื่อนขึ้น" ${idx === 0 ? 'disabled' : ''}>↑</button>
            <button class="move-btn" onclick="moveSnippet('${snippet.id}','down')" title="เลื่อนลง" ${idx === total-1 ? 'disabled' : ''}>↓</button>
          </div>
          ${snippet.code ? `<strong>${escHtml(snippet.code)}</strong><span class="code-badge">${escHtml(snippet.code)}</span>` : ''}
        </div>
        <div class="snippet-actions">
          <button class="action-btn star ${snippet.starred ? 'active' : ''}" onclick="toggleStar('${snippet.id}')" title="ติดดาว">★</button>
          <button class="action-btn" onclick="copySnippet('${snippet.id}')" title="คัดลอก">📋</button>
          <button class="action-btn" onclick="showEditSnippetModal('${snippet.id}')" title="แก้ไข">✏️</button>
          <button class="action-btn delete" onclick="deleteSnippet('${snippet.id}')" title="ลบ">🗑️</button>
        </div>
      </div>
      <div class="snippet-text">${escHtml(snippet.text)}</div>
    </div>
  `;
}

// ============================================================
// ACTIONS
// ============================================================
function handleSearch(value) {
  searchQuery = value;
  // Only update the visible list — do NOT rebuild the whole page or the search
  // input (that caused the lag/jank and cursor jumping). No save on keystroke.
  if (currentView.type !== 'category') return;
  const cat = data.categories.find(c => c.id === currentView.categoryId);
  const container = document.getElementById('snippetListContainer');
  if (cat && container) container.innerHTML = renderSnippetListHTML(cat);
}

function filterSubcategory(subId) {
  activeSubcategory = subId;
  renderContent();
}

function toggleStar(id) {
  const s = data.snippets.find(x => x.id === id);
  if (s) { s.starred = !s.starred; renderContent(); }
}

function copySnippet(id) {
  const s = data.snippets.find(x => x.id === id);
  if (s) {
    navigator.clipboard.writeText(s.text).then(() => {
      showToast('คัดลอกข้อความแล้ว!', 'success');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = s.text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('คัดลอกข้อความแล้ว!', 'success');
    });
  }
}

function moveSnippet(id, direction) {
  const catSnippets = data.snippets.filter(s => s.categoryId === data.snippets.find(x => x.id === id)?.categoryId);
  const globalIdx = data.snippets.indexOf(data.snippets.find(x => x.id === id));
  const catIdx = catSnippets.indexOf(catSnippets.find(x => x.id === id));

  if (direction === 'up' && catIdx > 0) {
    const prevId = catSnippets[catIdx - 1].id;
    const prevGlobalIdx = data.snippets.indexOf(data.snippets.find(x => x.id === prevId));
    [data.snippets[globalIdx], data.snippets[prevGlobalIdx]] = [data.snippets[prevGlobalIdx], data.snippets[globalIdx]];
    renderContent();
  } else if (direction === 'down' && catIdx < catSnippets.length - 1) {
    const nextId = catSnippets[catIdx + 1].id;
    const nextGlobalIdx = data.snippets.indexOf(data.snippets.find(x => x.id === nextId));
    [data.snippets[globalIdx], data.snippets[nextGlobalIdx]] = [data.snippets[nextGlobalIdx], data.snippets[globalIdx]];
    renderContent();
  }
}

function deleteSnippet(id) {
  if (confirm('ต้องการลบข้อความนี้หรือไม่?')) {
    data.snippets = data.snippets.filter(s => s.id !== id);
    renderContent();
    showToast('ลบข้อความแล้ว', 'success');
  }
}

function deleteCategory(id) {
  if (confirm('ต้องการลบหมวดหมู่นี้และข้อความทั้งหมดภายในหรือไม่?')) {
    data.snippets = data.snippets.filter(s => s.categoryId !== id);
    data.subcategories = data.subcategories.filter(s => s.categoryId !== id);
    data.categories = data.categories.filter(c => c.id !== id);
    renderContent();
    showToast('ลบหมวดหมู่แล้ว', 'success');
  }
}

function deleteSubcategory(id) {
  if (confirm('ต้องการลบหมวดหมู่ย่อยนี้หรือไม่? ข้อความจะยังคงอยู่ในหมวดหมู่หลัก')) {
    data.snippets.forEach(s => { if (s.subcategoryId === id) s.subcategoryId = null; });
    data.subcategories = data.subcategories.filter(s => s.id !== id);
    if (activeSubcategory === id) activeSubcategory = null;
    renderContent();
    showToast('ลบหมวดหมู่ย่อยแล้ว', 'success');
  }
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function showAddCategoryModal(pageId) {
  showModal(`
    <h2>เพิ่มหมวดหมู่</h2>
    <div class="form-group">
      <label>ชื่อหมวดหมู่</label>
      <input type="text" id="catName" placeholder="เช่น Link สินค้า, ตอบรีวิว">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addCategory('${pageId}')">เพิ่ม</button>

  `);
  setTimeout(() => document.getElementById('catName').focus(), 100);
}

function addCategory(pageId) {
  const name = document.getElementById('catName').value.trim();
  if (!name) return;
  data.categories.push({ id: genId(), pageId, name });
  closeModal();
  renderContent();
  showToast('เพิ่มหมวดหมู่แล้ว', 'success');
}

function showEditCategoryModal(catId) {
  const cat = data.categories.find(c => c.id === catId);
  if (!cat) return;
  showModal(`
    <h2>แก้ไขหมวดหมู่</h2>
    <div class="form-group">
      <label>ชื่อหมวดหมู่</label>
      <input type="text" id="catName" value="${escHtml(cat.name)}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="updateCategory('${catId}')">บันทึก</button>
    </div>
  `);
  setTimeout(() => document.getElementById('catName').focus(), 100);
}

function updateCategory(catId) {
  const name = document.getElementById('catName').value.trim();
  if (!name) return;
  const cat = data.categories.find(c => c.id === catId);
  if (cat) cat.name = name;
  closeModal();
  renderContent();
  showToast('แก้ไขหมวดหมู่แล้ว', 'success');
}

function showAddSubcategoryModal(catId) {
  showModal(`
    <h2>เพิ่มหมวดหมู่ย่อย</h2>
    <div class="form-group">
      <label>ชื่อหมวดหมู่ย่อย</label>
      <input type="text" id="subcatName" placeholder="เช่น รีวิว 5 ดาว">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addSubcategory('${catId}')">เพิ่ม</button>
    </div>
  `);
  setTimeout(() => document.getElementById('subcatName').focus(), 100);
}

function addSubcategory(catId) {
  const name = document.getElementById('subcatName').value.trim();
  if (!name) return;
  data.subcategories.push({ id: genId(), categoryId: catId, name });
  closeModal();
  renderContent();
  showToast('เพิ่มหมวดหมู่ย่อยแล้ว', 'success');
}

function showAddSnippetModal(catId) {
  const subs = data.subcategories.filter(s => s.categoryId === catId);
  const subOptions = subs.length > 0 ? `
    <div class="form-group">
      <label>หมวดหมู่ย่อย (ไม่บังคับ)</label>
      <select id="snippetSub" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
        <option value="">-- ไม่ระบุ --</option>
        ${subs.map(s => `<option value="${s.id}">${escHtml(s.name)}</option>`).join('')}
      </select>
    </div>
  ` : '';

  showModal(`
    <h2>เพิ่มข้อความ</h2>
    <div class="form-group">
      <label>รหัสสินค้า (ไม่บังคับ)</label>
      <input type="text" id="snippetCode" placeholder="เช่น 0933">
    </div>
    ${subOptions}
    <div class="form-group">
      <label>ข้อความ</label>
      <textarea id="snippetText" placeholder="พิมพ์ข้อความที่ต้องการบันทึก..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addSnippet('${catId}')">เพิ่ม</button>
    </div>
  `);
  setTimeout(() => document.getElementById('snippetCode').focus(), 100);
}

function addSnippet(catId) {
  const code = document.getElementById('snippetCode').value.trim();
  const text = document.getElementById('snippetText').value.trim();
  const subEl = document.getElementById('snippetSub');
  const subcategoryId = subEl ? subEl.value || null : null;
  if (!text) { showToast('กรุณาใส่ข้อความ', 'error'); return; }
  data.snippets.push({ id: genId(), categoryId: catId, subcategoryId, code, text, starred: false });
  closeModal();
  renderContent();
  showToast('เพิ่มข้อความแล้ว', 'success');
}

function showEditSnippetModal(snippetId) {
  const snippet = data.snippets.find(s => s.id === snippetId);
  if (!snippet) return;
  const subs = data.subcategories.filter(s => s.categoryId === snippet.categoryId);
  const subOptions = subs.length > 0 ? `
    <div class="form-group">
      <label>หมวดหมู่ย่อย</label>
      <select id="snippetSub" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
        <option value="">-- ไม่ระบุ --</option>
        ${subs.map(s => `<option value="${s.id}" ${snippet.subcategoryId === s.id ? 'selected' : ''}>${escHtml(s.name)}</option>`).join('')}
      </select>
    </div>
  ` : '';

  showModal(`
    <h2>แก้ไขข้อความ</h2>
    <div class="form-group">
      <label>รหัสสินค้า</label>
      <input type="text" id="snippetCode" value="${escHtml(snippet.code || '')}">
    </div>
    ${subOptions}
    <div class="form-group">
      <label>ข้อความ</label>
      <textarea id="snippetText">${escHtml(snippet.text)}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="updateSnippet('${snippetId}')">บันทึก</button>
    </div>
  `);
}

function updateSnippet(snippetId) {
  const snippet = data.snippets.find(s => s.id === snippetId);
  if (!snippet) return;
  const code = document.getElementById('snippetCode').value.trim();
  const text = document.getElementById('snippetText').value.trim();
  const subEl = document.getElementById('snippetSub');
  if (!text) { showToast('กรุณาใส่ข้อความ', 'error'); return; }
  snippet.code = code;
  snippet.text = text;
  if (subEl) snippet.subcategoryId = subEl.value || null;
  closeModal();
  renderContent();
  showToast('แก้ไขข้อความแล้ว', 'success');
}

// ============================================================
// UTILITIES
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Auto-login on page load if a session is saved
window.addEventListener('DOMContentLoaded', tryAutoLogin);
</script>
